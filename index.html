<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal DELTA</title>
    <link rel="stylesheet" href="./portal.css" />
    <link rel="icon" href="/componentes/img_portal.png" />
  </head>
  <body>
    <main class="login-container">
      <section class="panel-blue">
        <span class="version-tag">v2.0</span>
        <div class="blue-content">
          <h1>Bienvenido a <br /><strong>DELTA CRM</strong></h1>
          <img
            src="componentes/ilustracion-crm.svg"
            alt="Ilustración DELTA CRM"
            class="main-illustration"
          />
        </div>
        <footer class="ti-footer">
          <span class="shield-icon">🛡️</span> Desarrollado por TI
        </footer>
      </section>

      <section class="panel-white">
        <img
          src="componentes/logo-delta.svg"
          alt="Logo DELTA"
          class="main-logo"
        />

        <div class="brands-grid">
          <a href="https://deltapegomax.maxicassa.com" class="brand-card">
            <img src="componentes/logo-pegomax.svg" alt="Pegomax" />
          </a>
          <a href="https://deltatucassa.maxicassa.com" class="brand-card">
            <img src="componentes/logo-tucassa.svg" alt="Tu Cassa" />
          </a>
          <a href="https://deltatucassacr.maxicassa.com" class="brand-card">
            <img
              src="componentes/logo-tucassacr.svg"
              alt="Tu Cassa Costa Rica"
            />
          </a>
          <a href="https://deltainnovapack.maxicassa.com" class="brand-card">
            <img src="componentes/logo-innovapack.svg" alt="Innova Pack" />
          </a>

          <div class="brand-card">
            <a href="#" class="brand-card-pgc">
              <img src="componentes/logo-pegoconreto.svg" alt="Pego Concreto" />
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
